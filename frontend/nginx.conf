# Serves the Angular SPA as static files.
# The browser calls the backend API directly (no reverse-proxy to the API in this image),
# so nginx only handles static assets and SPA routing fallback.

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
